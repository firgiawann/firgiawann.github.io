name: Deploy Landing Page

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        working-directory: landing-page
        run: npm ci

      - name: Build landing page
        working-directory: landing-page
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site
          rsync -av --exclude='.git' --exclude='.github' --exclude='landing-page' --exclude='node_modules' ./ site/
          mkdir -p site/landing-page
          rsync -av landing-page/dist/ site/landing-page/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
